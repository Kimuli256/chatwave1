<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatWave</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
      --border: #2a2a32; --accent: #7c5cfc; --text: #e8e8f0; --muted: #6b6b80;
      --sent-bg: linear-gradient(135deg, #7c5cfc, #a078fd); --recv-bg: #1e1e24;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; position: relative; }

    /* ── MATRIX CANVAS ── */
    #matrix-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.18;
      pointer-events: none;
    }

    /* everything above canvas */
    .sidebar, .chat-area, .username-screen { position: relative; z-index: 1; }

    .sidebar { width: 280px; background: rgba(22,22,26,0.85); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; backdrop-filter: blur(6px); }
    .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #7c5cfc, #fc5c7d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .sidebar-header p { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(13,13,15,0.75); min-width: 0; backdrop-filter: blur(4px); }
    .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; background: rgba(22,22,26,0.85); backdrop-filter: blur(6px); }
    .chat-header-info { flex: 1; }
    .chat-header-info h2 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; }
    .chat-header-info span { font-size: 12px; color: #00e5a0; }
    .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 6px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; animation: msgIn 0.2s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-row.sent { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; background: linear-gradient(135deg, #7c5cfc, #a078fd); }
    .bubble { max-width: 62%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
    .recv .bubble { background: var(--recv-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }
    .sent .bubble { background: var(--sent-bg); border-bottom-right-radius: 4px; color: white; }
    .bubble-time { font-size: 10px; margin-top: 4px; opacity: 0.6; text-align: right; }
    .recv .bubble-time { text-align: left; }
    .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: rgba(22,22,26,0.9); backdrop-filter: blur(6px); display: flex; align-items: flex-end; gap: 10px; }
    .input-wrap { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: flex-end; padding: 10px 14px; gap: 10px; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,92,252,0.12); }
    .input-wrap textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; max-height: 100px; line-height: 1.5; }
    .input-wrap textarea::placeholder { color: var(--muted); }

    /* emoji btn inside input */
    .emoji-toggle { background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1; padding: 2px; opacity: 0.6; transition: opacity 0.2s; flex-shrink: 0; }
    .emoji-toggle:hover { opacity: 1; }

    .send-btn { width: 44px; height: 44px; background: linear-gradient(135deg, #7c5cfc, #a078fd); border: none; border-radius: 14px; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(124,92,252,0.4); }
    .send-btn:active { transform: scale(0.96); }

    /* emoji picker */
    #emoji-picker {
      display: none;
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: 280px;
    }
    #emoji-picker.open { display: block; }
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
    .emoji-grid button { background: none; border: none; font-size: 1.15rem; cursor: pointer; padding: 5px; border-radius: 8px; transition: background 0.15s; }
    .emoji-grid button:hover { background: rgba(124,92,252,0.15); }

    /* typing indicator */
    #typing-bar { padding: 4px 20px 0; font-size: 12px; color: var(--muted); min-height: 20px; }
    .typing-dots span { display: inline-block; animation: blink 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

    .username-screen { position: fixed; inset: 0; background: rgba(13,13,15,0.88); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
    .username-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; display: flex; flex-direction: column; gap: 16px; width: 300px; box-shadow: 0 8px 40px rgba(124,92,252,0.15); }
    .username-box h2 { font-family: 'Syne', sans-serif; font-size: 20px; background: linear-gradient(135deg, #7c5cfc, #fc5c7d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .username-box input { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
    .username-box input:focus { border-color: var(--accent); }
    .username-box button { background: linear-gradient(135deg, #7c5cfc, #a078fd); border: none; border-radius: 12px; padding: 12px; color: white; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: box-shadow 0.2s; }
    .username-box button:hover { box-shadow: 0 4px 20px rgba(124,92,252,0.4); }

    @media (max-width: 600px) { .sidebar { display: none; } #emoji-picker { left: 1rem; transform: none; width: calc(100% - 2rem); } }
  </style>
</head>
<body>

<!-- Matrix Rain Canvas -->
<canvas id="matrix-canvas"></canvas>

<div class="username-screen" id="usernameScreen">
  <div class="username-box">
    <h2>Welcome to ChatWave 👋</h2>
    <p style="color:var(--muted);font-size:13px;">Enter a username to start chatting</p>
    <input type="text" id="usernameInput" placeholder="Your name..." />
    <button onclick="setUsername()">Join Chat</button>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>ChatWave</h1>
    <p>Live chat room</p>
  </div>
</div>

<div class="chat-area">
  <div class="chat-header">
    <div class="chat-header-info">
      <h2>General Room</h2>
      <span>● Live</span>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div id="typing-bar"></div>

  <!-- Emoji Picker -->
  <div id="emoji-picker">
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="Type a message…"></textarea>
      <button class="emoji-toggle" id="emojiBtn" title="Emoji">😊</button>
    </div>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// ── MATRIX RAIN ────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&';
  const fontSize = 13;
  let cols, drops;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.floor(canvas.width / fontSize);
    drops = Array(cols).fill(1);
  }

  function draw() {
    ctx.fillStyle = 'rgba(13,13,15,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillStyle = '#c8ffc8';
      ctx.fillText(ch, i * fontSize, drops[i] * fontSize);
      ctx.fillStyle = '#00c832';
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, (drops[i] - 1) * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 45);
})();

// ── EMOJI PICKER ───────────────────────────────────────────
const EMOJIS = ['😀','😂','😍','🥰','😎','🤔','😮','😢','😡','🤣','👍','👎','❤️','🔥','⚡','✅','❌','💯','🎉','🚀','💻','🌐','🙏','💪','🤝','😏','🥳','😴','🤖','👾','🫡','✨'];
const emojiGrid = document.getElementById('emoji-grid');
const emojiPicker = document.getElementById('emoji-picker');
const emojiBtn = document.getElementById('emojiBtn');
const msgInput = document.getElementById('msgInput');

EMOJIS.forEach(e => {
  const btn = document.createElement('button');
  btn.textContent = e;
  btn.addEventListener('click', () => {
    msgInput.value += e;
    msgInput.focus();
    emojiPicker.classList.remove('open');
  });
  emojiGrid.appendChild(btn);
});

emojiBtn.addEventListener('click', ev => {
  ev.stopPropagation();
  emojiPicker.classList.toggle('open');
});
document.addEventListener('click', () => emojiPicker.classList.remove('open'));
emojiPicker.addEventListener('click', ev => ev.stopPropagation());

// ── SUPABASE ───────────────────────────────────────────────
const SUPABASE_URL = 'https://nrpdptneveehdmrkhtqh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tOQS5NK0QYH_-of_g_tfyg_N2qPVA-K';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  realtime: { params: { eventsPerSecond: 10 } }
});

let username = '';
let typingChannel = null;
let typingTimeout = null;
const typingBar = document.getElementById('typing-bar');

// ── USERNAME ───────────────────────────────────────────────
function setUsername() {
  const val = document.getElementById('usernameInput').value.trim();
  if (!val) return;
  username = val;
  document.getElementById('usernameScreen').style.display = 'none';
  loadMessages().then(() => {
    subscribeToMessages();
    setupTypingChannel();
  });
}

// ── LOAD MESSAGES ──────────────────────────────────────────
async function loadMessages() {
  try {
    const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: true });
    if (error) { console.error('Load error:', error.message); return; }
    if (data && data.length > 0) {
      data.forEach(msg => { renderedIds.add(msg.id); renderMessage(msg); });
    }
  } catch(e) {
    console.error('Load failed:', e);
  }
}

// ── REALTIME MESSAGES ──────────────────────────────────────
const renderedIds = new Set();

function subscribeToMessages() {
  client.channel('realtime-messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
      const msg = payload.new;
      if (renderedIds.has(msg.id)) return;
      renderedIds.add(msg.id);
      renderMessage(msg);
    }).subscribe((status) => {
      console.log('Realtime status:', status);
    });
}

// ── TYPING INDICATOR ───────────────────────────────────────
function setupTypingChannel() {
  typingChannel = client.channel('typing-room', { config: { broadcast: { self: false } } });
  typingChannel.on('broadcast', { event: 'typing' }, ({ payload }) => {
    typingBar.innerHTML = `<span style="color:var(--accent)">${payload.name}</span> is typing <span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>`;
    clearTimeout(typingBar._hide);
    typingBar._hide = setTimeout(() => { typingBar.innerHTML = ''; }, 2500);
  }).subscribe();
}

function broadcastTyping() {
  if (!typingChannel || !username) return;
  typingChannel.send({ type: 'broadcast', event: 'typing', payload: { name: username } }).catch(()=>{});
}

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(broadcastTyping, 400);
});

// ── SEND ───────────────────────────────────────────────────
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !username) return;
  msgInput.value = '';
  msgInput.style.height = 'auto';

  // Show message instantly (optimistic UI)
  const tempMsg = {
    id: 'temp_' + Date.now(),
    username,
    text,
    created_at: new Date().toISOString()
  };
  renderedIds.add(tempMsg.id);
  renderMessage(tempMsg);

  const { data, error } = await client.from('messages').insert([{ username, text }]).select().single();
  if (error) {
    console.error('Insert error:', error.message);
  } else if (data) {
    // Mark real ID as rendered so realtime doesn't duplicate it
    renderedIds.add(data.id);
  }
}

// ── RENDER MESSAGE ─────────────────────────────────────────
function renderMessage(msg) {
  const messages = document.getElementById('messages');
  const isSent = msg.username === username;
  const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const row = document.createElement('div');
  row.className = `msg-row ${isSent ? 'sent' : 'recv'}`;
  row.innerHTML = `
    ${!isSent ? `<div class="msg-avatar">${msg.username[0].toUpperCase()}</div>` : ''}
    <div>
      ${!isSent ? `<div style="font-size:11px;color:var(--muted);margin-bottom:3px;">${msg.username}</div>` : ''}
      <div class="bubble">${escapeHtml(msg.text)}</div>
      <div class="bubble-time">${time}</div>
    </div>`;
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('usernameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') setUsername();
});
</script>
</body>
</html>
